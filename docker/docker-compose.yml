version: '3.8'

services:
  ppe-inference:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    
    # 核心：工業級自動復歸機制 (筆記 P.5)
    restart: always
    
    # 允許存取 RPi Camera 硬體 (筆記 P.6)
    privileged: true
    
    volumes:
      - ../:/app
      - /dev:/dev
      
    env_file:
      - ../config/.env